<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Ritesh Kumaar Portfolio</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">RK</div>
    <h1 class="login-title">Admin Panel</h1>
    <p class="login-sub">Sign in to manage your portfolio</p>

    <div class="login-error" id="login-error">Invalid email or password. Please try again.</div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="login-email" class="form-control" placeholder="admin@portfolio.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative">
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" autocomplete="current-password" required style="padding-right:40px">
          <button type="button" id="toggle-pass" onclick="togglePass()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;padding:4px;line-height:1" title="Show/hide password">
            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="login-btn" id="login-btn">Sign In</button>
    </form>

    <p style="font-size:11px;color:var(--a-muted);text-align:center;margin-top:20px">
      Use the email and password set in Firebase Console → Authentication.
    </p>
  </div>
</div>

<script type="module" src="admin.js"></script>
<script>
/* Auth redirect is handled by onAuthStateChanged in admin.js */

function togglePass() {
  const inp  = document.getElementById('login-password');
  const show = inp.type === 'password';
  inp.type   = show ? 'text' : 'password';
  document.getElementById('eye-icon').innerHTML = show
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-error');
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;

  btn.textContent = 'Signing in…';
  btn.disabled = true;
  err.classList.remove('show');

  try {
    const timeout = new Promise((_, rej) =>
      setTimeout(() => rej(new Error('Request timed out. Check your internet connection.')), 10000)
    );
    await Promise.race([Auth.login(email, pass), timeout]);
    /* onAuthStateChanged in admin.js handles redirect to dashboard */
  } catch (ex) {
    const code = ex.code || '';
    err.textContent =
      code === 'auth/invalid-credential' || code === 'auth/wrong-password' || code === 'auth/user-not-found'
        ? 'Invalid email or password. Please try again.'
        : code === 'auth/too-many-requests'
        ? 'Too many attempts. Wait a moment and try again.'
        : code === 'auth/network-request-failed'
        ? 'Network error. Check your internet connection.'
        : (ex.message || 'Sign in failed.');
    err.classList.add('show');
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
